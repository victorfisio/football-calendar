name: Football Calendar Sync

on:

  schedule:
    - cron: "*/45 * * * *"

  workflow_dispatch:

jobs:

  sync:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Create credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > credentials/service-account.json

      - name: Create .env
        run: |
          echo "API_FOOTBALL_KEY=${{ secrets.API_FOOTBALL_KEY }}" >> .env
          echo "PALMEIRAS_CALENDAR_ID=${{ secrets.PALMEIRAS_CALENDAR_ID }}" >> .env
          echo "ARSENAL_CALENDAR_ID=${{ secrets.ARSENAL_CALENDAR_ID }}" >> .env

      - run: npm start