name: Football Calendar Sync

on:

  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:

  sync:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create credentials file
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > credentials/service-account.json

      - name: Create .env
        run: |
          echo "SPORTSDB_API_KEY=${{ secrets.SPORTSDB_API_KEY }}" >> .env
          echo "PALMEIRAS_CALENDAR_ID=${{ secrets.PALMEIRAS_CALENDAR_ID }}" >> .env
          echo "ARSENAL_CALENDAR_ID=${{ secrets.ARSENAL_CALENDAR_ID }}" >> .env

      - name: Run synchronization
        run: npm start